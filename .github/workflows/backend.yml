name: Node Backend Deploy

on:
  push:
    paths:
      - 'growithus_api/**'
    branches:
      - '*release-*'

  workflow_dispatch:
    inputs:
      deploy_branch:
        description: 'Branch to deploy'
        required: true
        default: 'release'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.deploy_branch || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node 24
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Build Docker image locally (optional)
        run: |
          cd growithus_api
          docker build -t backend .

      - name: SSH & Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            mkdir -p ~/backend
            cd ~/backend

            # Initialize git if needed
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/<your-username>/<repo>.git
            fi

            # Checkout & reset to correct branch
            BRANCH="${{ github.event.inputs.deploy_branch || github.ref_name }}"
            echo "🚀 Deploying branch: $BRANCH"

            git fetch origin $BRANCH
            git checkout $BRANCH || git checkout -b $BRANCH origin/$BRANCH
            git reset --hard origin/$BRANCH

            echo "📌 Deployed commit:"
            git log -1 --oneline

            # Stop and remove any container using port 3000
            docker ps -q --filter "publish=3000" | xargs -r docker stop
            docker ps -aq --filter "publish=3000" | xargs -r docker rm

            # Also remove backend container if exists
            docker rm -f backend || true

            # Build and run Docker container
            docker build --no-cache -t backend .
            docker run -d --name backend \
              -p 3000:3000 \
              --restart unless-stopped \
              -e NODE_ENV=production \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              backend

            # Run Sequelize migrations
            docker exec backend npx sequelize-cli db:migrate
