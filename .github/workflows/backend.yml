name: Node Backend Deploy

on:
  push:
    paths:
      - 'growithus_api/**'
    branches:
      - '*release*'

  workflow_dispatch:
    inputs:
      deploy_branch:
        description: 'Branch to deploy'
        required: true
        default: 'release'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.deploy_branch || github.ref_name }}

      - name: Copy backend code to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "growithus_api"
          target: "~/backend"

      - name: SSH & Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            # Clean & recreate backend directory
            rm -rf ~/backend
            mkdir -p ~/backend

            # Copy backend code
            cd ~/backend

            # Stop and remove existing container
            docker rm -f backend || true

            # Build Docker image
            cd growithus_api
            docker build --no-cache -t backend .

            # Run container
            docker run -d \
              --name backend \
              -p 3000:3000 \
              --restart unless-stopped \
              -e NODE_ENV=production \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              backend

            # Run migrations
            docker exec backend npx sequelize-cli db:migrate
